version: '3.8'

services:
  app:
    build: .
    restart: always
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 500M
    networks:
      - resume-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
       - /etc/letsencrypt:/etc/letsencrypt:ro 
    depends_on:
      - app
    networks:
      - resume-network

networks:
  resume-network:
    driver: bridge